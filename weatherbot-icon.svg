<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1e3c72"/>

  <!-- Cloud for weather -->
  <path d="M 60 140 Q 50 140 45 130 Q 40 120 50 110 Q 55 100 65 100 Q 70 90 85 90 Q 100 90 105 100 Q 115 100 120 110 Q 125 120 115 130 Q 110 140 100 140 Z" fill="#ffffff" opacity="0.8"/>

  <!-- Weather icon (sun peeking through) -->
  <circle cx="140" cy="100" r="20" fill="#FFD700" opacity="0.9"/>

  <!-- Chart bars (trading performance) -->
  <rect x="70" y="170" width="12" height="30" fill="#4CAF50"/>
  <rect x="90" y="155" width="12" height="45" fill="#2196F3"/>
  <rect x="110" y="160" width="12" height="40" fill="#4CAF50"/>
  <rect x="130" y="150" width="12" height="50" fill="#2196F3"/>
  <rect x="150" y="165" width="12" height="35" fill="#4CAF50"/>
  <rect x="170" y="170" width="12" height="30" fill="#FFC107"/>

  <!-- Trending up indicator -->
  <polyline points="60,175 80,165 100,170 120,155 140,165" stroke="#4CAF50" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Robot marker (trading bot) -->
  <circle cx="215" cy="220" r="15" fill="#FF5722"/>
  <text x="215" y="225" text-anchor="middle" font-size="18" fill="white" font-weight="bold">🤖</text>
</svg>
